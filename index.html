<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>英単語コンテスト Smart Learner Pro</title>
    <!-- プレミアムアイコン用 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #08090c;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* iPhoneの画面にぴったりとフィットさせるレスポンシブコンテナ */
        #container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            max-width: 480px;
            max-height: 850px;
            background-color: #0d1117;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        @media (min-width: 480px) and (min-height: 850px) {
            #container {
                border: 1px solid #1f2937;
                border-radius: 24px;
            }
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #0b0c10;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .header-buttons {
            position: absolute;
            top: calc(15px + env(safe-area-inset-top, 0px));
            right: 15px;
            display: flex;
            gap: 8px;
            pointer-events: auto;
            z-index: 10;
        }
        .btn-ui {
            background: rgba(31, 41, 55, 0.85);
            border: 1px solid #374151;
            color: #9ca3af;
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-ui:hover, .btn-ui:active {
            border-color: #00FF66;
            color: #00FF66;
            background: rgba(0, 255, 102, 0.1);
        }
        .btn-reset-danger:hover, .btn-reset-danger:active {
            border-color: #ff3366;
            color: #ff3366;
            background: rgba(255, 51, 102, 0.1);
        }
        /* インポート＆エクスポートモーダル */
        #modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 7, 10, 0.9);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: #111622;
            border: 1px solid #374151;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            max-height: 90%;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .modal-title {
            color: #00E5FF;
            font-size: 16px;
            font-weight: bold;
            margin: 0;
            border-bottom: 1px solid #1f2937;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            color: #9ca3af;
            cursor: pointer;
            font-size: 18px;
        }
        .modal-close:hover {
            color: #ff3366;
        }
        .modal-desc {
            color: #9ca3af;
            font-size: 11px;
            line-height: 1.4;
        }

            border-radius: 8px;

            padding: 10px;

        }

            display: flex;

        }
        .btn-modal-action {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;

let isInitialized = false;

// 選択肢ボタン内の自動改行 & センタリング
function drawButtonText(context, text, startX, centerY, maxWidth, baseLineHeight) {
    const isJapanese = !!text.match(/[\u3000-\u303f\u3040-\u309f\u30a0-\u30ff\uff00-\uff9f\u4e00-\u9faf]/);
    let lines = [];
    
    if (isJapanese) {
        let chars = text.split('');
        let currentLine = '';
        for (let i = 0; i < chars.length; i++) {
            let testLine = currentLine + chars[i];
            let metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && i > 0) {
                lines.push(currentLine);
                currentLine = chars[i];
            } else {
                currentLine = testLine;
            }
        }
        lines.push(currentLine);
    } else {
        let words = text.split(' ');
        let currentLine = '';
        for (let i = 0; i < words.length; i++) {
            let testLine = currentLine + (currentLine ? ' ' : '') + words[i];
            let metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && i > 0) {
                lines.push(currentLine);
                currentLine = words[i];
            } else {
                currentLine = testLine;
            }
        }
        lines.push(currentLine);
    }

    const totalHeight = lines.length * baseLineHeight;
    let startY = centerY - (totalHeight / 2) + (baseLineHeight / 2) + 3;

    for (let i = 0; i < lines.length; i++) {
        context.fillText(lines[i], startX, startY + i * baseLineHeight);
    }
}

// ==========================================
// 【アプリケーション状態管理】
// ==========================================
class AppState {
    constructor() {
        this.items = [];
        this.currentItem = null;
        this.direction = 'en_to_ja'; 
        this.choices = [];      
        this.isAnswered = false; 
        this.selectedChoice = null; 
        
        this.isFlipped = false; 
        this.flipProgress = 0;  
        this.flipDirection = 1; 
        this.isTransitioning = false; 
        this.cardOffsetPercent = 0;  

        this.particles = [];    
        this.learningRate = 0;  
        this.targetLearningRate = 0; 

        // コンボ機能用ステート
        this.comboCount = 0;
        this.comboTextScale = 0;
        this.comboTextAlpha = 0;
        
        this.stats = {
            total: 0,
            mastered: 0,
            streakMax: 3
        };
    }

    async init() {
        // 1. まずCSVデータの取得を試みる（ファイル名: word.csv）
        let dataSource = [];
        try {
            const response = await fetch('word.csv');
            if (response.ok) {
                let csvText = await response.text();
                // UTF-8 BOM（\uFEFF）をクリア
                csvText = csvText.replace(/^\uFEFF/, '');
                dataSource = this.parseCSV(csvText);
                showToast(`CSVデータを読み込みました (${dataSource.length}語)`);
            } else {
                dataSource = INITIAL_DATA_SOURCE;
            }
        } catch (e) {
            dataSource = INITIAL_DATA_SOURCE;
        }

        if (dataSource.length === 0) {
            dataSource = INITIAL_DATA_SOURCE;
        }

        // 2. ローカルストレージの進捗読み込み
        const savedData = localStorage.getItem('eiken_pre2_progress_v4');
        if (savedData) {
            try {
                const parsed = JSON.parse(savedData);
                // CSVにあるキーに対し、進捗を結合して適用
                this.items = dataSource.map(dItem => {
                    const matched = parsed.find(p => p.question === dItem.question);
                    return {
                        ...dItem,
                        correctStreakEnJa: matched ? Math.max(0, parseInt(matched.correctStreakEnJa) || 0) : 0,
                        correctStreakJaEn: matched ? Math.max(0, parseInt(matched.correctStreakJaEn) || 0) : 0
                    };
                });
            } catch (e) {
                this.loadDefaultData(dataSource);
            }
        } else {
            this.loadDefaultData(dataSource);
        }

        this.calculateStats();
        this.learningRate = this.targetLearningRate;
        this.pickNextItem(true);
    }

    // クォーテーションやカンマが入れ子になったCSV行を適切に処理
    parseCSV(text) {
        const lines = text.split(/\r?\n/);
        const result = [];
        let index = 1;
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            
            let parts = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if ((char === ',' || char === '\t') && !inQuotes) {
                    parts.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            parts.push(current.trim());

            if (parts.length >= 2) {
                const q = parts[0].replace(/^"|"$/g, '').trim();
                let a = parts[1].replace(/^"|"$/g, '').trim();
                
                if (q && a) {
                    // CSV内での「\n」のテキスト（円記号やバックスラッシュなど）を実際の改行コードに変換
                    a = a.replace(/\\n/g, '\n').replace(/\\r/g, '\r');
                    a = a.replace(/￥n/g, '\n').replace(/￥r/g, '\r');
                    
                    result.push({
                        id: `csv_w_${index++}`,
                        type: "word",
                        question: q,
                        answer: a
                    });
                }
            }
        }
        return result;
    }

    loadDefaultData(source) {
        this.items = source.map(item => ({
            ...item,
            correctStreakEnJa: 0,
            correctStreakJaEn: 0
        }));
    }

    save() {
        localStorage.setItem('eiken_pre2_progress_v4', JSON.stringify(this.items));
    }

    reset() {
        this.items.forEach(item => {
            item.correctStreakEnJa = 0;
            item.correctStreakJaEn = 0;
        });
        this.comboCount = 0;
        this.save();
        this.calculateStats();
        this.isFlipped = false;
        this.flipProgress = 0;
        this.isAnswered = false;
        this.selectedChoice = null;
        this.pickNextItem(true);
    }

    calculateStats() {
        this.stats.total = this.items.length;
        this.stats.mastered = this.items.filter(item => 
            item.correctStreakEnJa >= this.stats.streakMax && 
            item.correctStreakJaEn >= this.stats.streakMax
        ).length;
        
        let totalProgressPoints = 0;
        this.items.forEach(item => {
            totalProgressPoints += Math.min(this.stats.streakMax, item.correctStreakEnJa);
            totalProgressPoints += Math.min(this.stats.streakMax, item.correctStreakJaEn);
        });
        
        const maxPoints = this.stats.total * this.stats.streakMax * 2;
        this.targetLearningRate = maxPoints > 0 ? (totalProgressPoints / maxPoints) * 100 : 0;
    }

    getShortAnswer(item) {
        return item.answer.split('\n')[0];
    }

    pickNextItem(isInitial = false) {
        if (this.items.length === 0) return;

        const unmasteredItems = this.items.filter(item => 
            item.correctStreakEnJa < this.stats.streakMax || 
            item.correctStreakJaEn < this.stats.streakMax
        );
        const masteredItems = this.items.filter(item => 
            item.correctStreakEnJa >= this.stats.streakMax && 
            item.correctStreakJaEn >= this.stats.streakMax
        );

        if (unmasteredItems.length > 0) {
            if (masteredItems.length > 0 && Math.random() < 0.05) {
                const idx = Math.floor(Math.random() * masteredItems.length);
                this.currentItem = masteredItems[idx];
            } else {
                let pool = [];
                unmasteredItems.forEach(item => {
                    const avgStreak = (item.correctStreakEnJa + item.correctStreakJaEn) / 2;
                    let weight = 3;
                    if (avgStreak >= 1 && avgStreak < 2) weight = 2;
                    if (avgStreak >= 2) weight = 1.2;

                    for (let i = 0; i < weight * 10; i++) {
                        pool.push(item);
                    }
                });
                const idx = Math.floor(Math.random() * pool.length);
                this.currentItem = pool[idx];
            }
        } else {
            const idx = Math.floor(Math.random() * this.items.length);
            this.currentItem = this.items[idx];
        }

        const needEnJa = this.currentItem.correctStreakEnJa < this.stats.streakMax;
        const needJaEn = this.currentItem.correctStreakJaEn < this.stats.streakMax;

        if (needEnJa && !needJaEn) {
            this.direction = 'en_to_ja';
        } else if (!needEnJa && needJaEn) {
            this.direction = 'ja_to_en';
        } else {
            this.direction = Math.random() < 0.5 ? 'en_to_ja' : 'ja_to_en';
        }

        this.choices = [];

        if (this.direction === 'en_to_ja') {
            const correctText = this.getShortAnswer(this.currentItem);
            this.choices.push({ text: correctText, isCorrect: true, id: this.currentItem.id });

            let candidates = this.items.filter(item => item.id !== this.currentItem.id);
            candidates.sort(() => Math.random() - 0.5);

            for (let i = 0; i < Math.min(4, candidates.length); i++) {
                this.choices.push({
                    text: this.getShortAnswer(candidates[i]),
                    isCorrect: false,
                    id: candidates[i].id
                });
            }
        } else {
            const correctText = this.currentItem.question;
            this.choices.push({ text: correctText, isCorrect: true, id: this.currentItem.id });

            let candidates = this.items.filter(item => item.id !== this.currentItem.id);
            candidates.sort(() => Math.random() - 0.5);

            for (let i = 0; i < Math.min(4, candidates.length); i++) {
                this.choices.push({
                    text: candidates[i].question,
                    isCorrect: false,
                    id: candidates[i].id
                });
            }
        }

        while (this.choices.length < 5) {
            this.choices.push({ text: "--- (データ不足) ---", isCorrect: false, id: "dummy" });
        }

        this.choices.sort(() => Math.random() - 0.5);

        this.isFlipped = false;
        this.flipProgress = 0;
        this.isAnswered = false;
        this.selectedChoice = null;
        this.cardOffsetPercent = isInitial ? 0 : 100; 
    }

    selectChoice(choice) {
        if (this.isAnswered || this.isTransitioning) return;

        this.isAnswered = true;
        this.selectedChoice = choice;

        if (choice.isCorrect) {
            if (this.direction === 'en_to_ja') {
                this.currentItem.correctStreakEnJa += 1;
            } else {
                this.currentItem.correctStreakJaEn += 1;
            }
            
            this.comboCount += 1;
            
            // コンボに応じたエフェクト調整 (1〜5段階)
            const power = Math.min(5, this.comboCount);
            const particleCount = 15 + power * 15; // コンボが高いほど大量に！
            const speedMultiplier = 1 + power * 0.3; // コンボが高いほど勢いよく！
            
            createConfetti(VIEW_WIDTH / 2, layout.cardCenterY, '#00FF66', particleCount, speedMultiplier);

            // コンボテキスト演出開始
            if (this.comboCount >= 2) {
                this.comboTextScale = 0.4;
                this.comboTextAlpha = 1.0;
            }
        } else {
            if (this.direction === 'en_to_ja') {
                this.currentItem.correctStreakEnJa = 0;
            } else {
                this.currentItem.correctStreakJaEn = 0;
            }
            this.comboCount = 0; // コンボリセット
            createConfetti(VIEW_WIDTH / 2, layout.cardCenterY, '#ff3366', 20, 1.0);
        }

        this.save();
        this.calculateStats();

        this.flipDirection = 1;
        let flipTimer = 0;
        const flipDuration = 10;
        const self = this;
        
        function animateFlip() {
            flipTimer++;
            self.flipProgress = flipTimer / flipDuration;

            if (flipTimer === Math.floor(flipDuration / 2)) {
                self.isFlipped = true;
            }

            if (flipTimer < flipDuration) {
                requestAnimationFrame(animateFlip);
            } else {
                self.flipProgress = 1;
            }
        }
        animateFlip();
    }

    nextQuestion() {
        if (this.isTransitioning) return;
        this.isTransitioning = true;
        
        let slideTimer = 0;
        const slideDuration = 12;
        const self = this;

        function animateTransition() {
            slideTimer++;
            self.cardOffsetPercent = -(slideTimer / slideDuration) * 100;

            if (slideTimer >= slideDuration) {
                self.pickNextItem(false); 
                self.isTransitioning = false;
                
                let slideInTimer = 0;
                const slideInDuration = 10;
                function animateSlideIn() {
                    slideInTimer++;
                    self.cardOffsetPercent = 100 - (slideInTimer / slideInDuration) * 100;
                    if (slideInTimer < slideInDuration) {
                        requestAnimationFrame(animateSlideIn);
                    } else {
                        self.cardOffsetPercent = 0;
                    }
                }
                animateSlideIn();
            } else {
                requestAnimationFrame(animateTransition);
            }
        }
        animateTransition();
    }
}

// 【Canvas 初期セットアップ】

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const app = new AppState();

function resizeCanvas() {
    const container = document.getElementById('container');
    const rect = container.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
}

// Y座標・セーフエリアをデバイスごとに最適調整
function updateLayout() {
    const container = document.getElementById('container');
    const rect = container.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return false;

    const scale = rect.width / VIEW_WIDTH;
    const computedHeight = rect.height / scale;

    if (isNaN(scale) || !isFinite(scale) || isNaN(computedHeight) || !isFinite(computedHeight)) {
        return false;
    }

    layout.scale = scale;
    layout.height = computedHeight;
    isInitialized = true;
    
    const aspectRatio = rect.height / rect.width;
    const hasNotch = aspectRatio > 1.8;
    layout.safeAreaTop = hasNotch ? 45 : 15;
    layout.safeAreaBottom = hasNotch ? 35 : 15;
    
    layout.headerBottom = layout.safeAreaTop + 110; 
    
    const btnH = 54;
    const spacing = 9;
    const totalButtonsHeight = 5 * btnH + 4 * spacing; 
    layout.startY = layout.height - layout.safeAreaBottom - totalButtonsHeight;
    
    layout.btnY = layout.height - layout.safeAreaBottom - 15 - 65; 
    layout.resultY = layout.btnY - 15 - 110; 
    
    // 改行レイアウトを崩さないよう中心座標を再調整
    if (!app.isAnswered) {
        const availableSpace = layout.startY - layout.headerBottom;
        layout.cardCenterY = layout.headerBottom + availableSpace / 2 - 8;
        layout.cardH = Math.min(220, availableSpace - 16);
    } else {
        const availableSpace = layout.resultY - layout.headerBottom;
        layout.cardCenterY = layout.headerBottom + availableSpace / 2 - 8;
        layout.cardH = Math.min(220, availableSpace - 16);
    }
    return true;
}

window.addEventListener('resize', resizeCanvas);
window.addEventListener('load', async () => {
    resizeCanvas();
    await app.init();
    gameLoop();
});

function getRelativeCoords(event) {
    const rect = canvas.getBoundingClientRect();
    const clientX = event.touches ? event.touches[0].clientX : event.clientX;
    const clientY = event.touches ? event.touches[0].clientY : event.clientY;
    
    const touchX = clientX - rect.left;
    const touchY = clientY - rect.top;
    
    return {
        x: touchX / layout.scale,
        y: touchY / layout.scale
    };
}

// ==========================================
// 【アニメーション & パーティクル】
// ==========================================
class Particle {
    constructor(x, y, color, speedMultiplier = 1) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = Math.random() * 5 + 2;
        this.speedX = (Math.random() - 0.5) * 10 * speedMultiplier;
        this.speedY = (Math.random() - 0.8) * 12 * speedMultiplier - 2;
        this.gravity = 0.22;
        this.alpha = 1;
        this.life = Math.random() * 25 + 25;
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.alpha -= 1 / this.life;
        if (this.alpha < 0) this.alpha = 0;
    }

    draw(context) {
        context.save();
        context.globalAlpha = this.alpha;
        context.fillStyle = this.color;
        context.shadowBlur = 10;
        context.shadowColor = this.color;
        context.beginPath();
        context.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        context.fill();
        context.restore();
    }
}

function createConfetti(x, y, color, count = 20, speedMultiplier = 1) {
    for (let i = 0; i < count; i++) {
        app.particles.push(new Particle(x, y, color, speedMultiplier));
    }
}

// ==========================================
// 【インタラクション制御】
// ==========================================
function handleInteraction(coords) {
    if (app.isTransitioning || !isInitialized) return;

    const { x, y } = coords;

    if (!app.isAnswered) {
        const btnX = 30;
        const btnW = VIEW_WIDTH - 60; 
        const btnH = 54;
        const startY = layout.startY;
        const spacing = 9;

        for (let i = 0; i < 5; i++) {
            const currentBtnY = startY + i * (btnH + spacing);
            if (x >= btnX && x <= btnX + btnW && y >= currentBtnY && y <= currentBtnY + btnH) {
                app.selectChoice(app.choices[i]);
                return;
            }
        }
    }

    if (app.isAnswered && app.isFlipped && app.flipProgress === 1) {
        const btnY = layout.btnY;
        const btnW = VIEW_WIDTH - 80;
        const btnH = 65;
        const btnX = 40;
        if (y >= btnY && y <= btnY + btnH && x >= btnX && x <= btnX + btnW) {
            app.nextQuestion();
        }
    }
}

function resetProgress() {
    showToast("学習状況をリセットしました");
    app.reset();
    createConfetti(VIEW_WIDTH / 2, layout.cardCenterY, '#ff3366', 30);
}

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const coords = getRelativeCoords(e);
    handleInteraction(coords);
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
    const coords = getRelativeCoords(e);
    handleInteraction(coords);
});

// ==========================================
// 【描画処理】
// ==========================================
function drawApp() {
    if (!updateLayout() || !isInitialized) return;

    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.restore();

    ctx.save();
    ctx.scale(layout.scale, layout.scale);
    
    drawBackground();
    drawHeader();
    drawCard();
    drawInteractiveArea();
    drawComboAnimation();
    updateAndDrawParticles();
    
    ctx.restore();
}

function drawBackground() {
    if (!isInitialized || isNaN(layout.height) || !isFinite(layout.height)) {
        ctx.fillStyle = '#0a0d14';
        ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
        return;
    }
    
    let bgGrad = ctx.createLinearGradient(0, 0, 0, layout.height);
    bgGrad.addColorStop(0, '#0a0d14');
    bgGrad.addColorStop(1, '#05070a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, VIEW_WIDTH, layout.height);

    ctx.strokeStyle = 'rgba(0, 255, 102, 0.015)';
    ctx.lineWidth = 1;
    for (let i = 0; i < VIEW_WIDTH; i += 30) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, layout.height);
        ctx.stroke();
    }
    for (let j = 0; j < layout.height; j += 30) {
        ctx.beginPath();
        ctx.moveTo(0, j);
        ctx.lineTo(VIEW_WIDTH, j);
        ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(0, 229, 255, 0.08)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(20, layout.safeAreaTop + 35);
    ctx.lineTo(VIEW_WIDTH - 20, layout.safeAreaTop + 35);
    ctx.stroke();
}

function drawHeader() {
    const top = layout.safeAreaTop;
    
    ctx.fillStyle = '#00FF66';
    ctx.font = 'bold 11px "Courier New", monospace';
    ctx.fillText('VOCABULARY CONTEST : SMART LEARNER PRO', 30, top + 15);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 20px Helvetica, Arial, sans-serif';
    ctx.fillText('学習進捗率', 30, top + 55);

    const diff = app.targetLearningRate - app.learningRate;
    app.learningRate += diff * 0.1;
    const displayRate = app.learningRate.toFixed(1);

    ctx.textAlign = 'right';
    ctx.fillStyle = '#00E5FF';
    ctx.font = 'italic bold 28px "Courier New", monospace';
    ctx.fillText(`${displayRate}%`, VIEW_WIDTH - 30, top + 55);
    ctx.textAlign = 'left';

    const barX = 30;
    const barY = top + 72;
    const barW = VIEW_WIDTH - 60;
    const barH = 10;

    ctx.fillStyle = '#111827';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, 5);
    ctx.fill();

    const fillW = (app.learningRate / 100) * barW;
    if (fillW > 0) {
        let grad = ctx.createLinearGradient(barX, barY, barX + barW, barY);
        grad.addColorStop(0, '#00FF66');
        grad.addColorStop(1, '#00E5FF');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(barX, barY, fillW, barH, 5);
        ctx.fill();

        ctx.shadowBlur = 8;
        ctx.shadowColor = '#00E5FF';
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(barX + fillW, barY + barH/2, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    ctx.fillStyle = '#4b5563';
    ctx.font = '11px Helvetica, sans-serif';
    ctx.fillText(`MASTERED: ${app.stats.mastered} / ${app.stats.total} words`, 32, top + 98);

    ctx.textAlign = 'right';
    if (app.comboCount >= 1) {
        ctx.fillStyle = '#00FF66';
        ctx.font = 'bold 11px Helvetica, sans-serif';
        ctx.fillText(`CURRENT COMBO: ${app.comboCount}`, VIEW_WIDTH - 32, top + 98);
    } else {
        ctx.fillStyle = '#4b5563';
        ctx.fillText(`TOTAL: ${app.stats.total} words`, VIEW_WIDTH - 32, top + 98);
    }
    ctx.textAlign = 'left';
}

function drawCard() {
    if (!app.currentItem) return;

    ctx.save();

    const cardX = VIEW_WIDTH / 2;
    const cardY = layout.cardCenterY; 
    const cardW = 420;
    const cardH = layout.cardH; 

    const slideOffset = (app.cardOffsetPercent / 100) * VIEW_WIDTH;
    ctx.translate(cardX + slideOffset, cardY);

    const scaleX = Math.abs(Math.cos(app.flipProgress * Math.PI));
    ctx.scale(scaleX, 1);

    let cardGrad = ctx.createLinearGradient(0, -cardH/2, 0, cardH/2);
    if (app.isFlipped) {
        cardGrad.addColorStop(0, '#151c28');
        cardGrad.addColorStop(1, '#0a0d14');
    } else {
        cardGrad.addColorStop(0, '#111827');
        cardGrad.addColorStop(1, '#0d1117');
    }
    ctx.fillStyle = cardGrad;

    const accentColor = '#00FF66';
    ctx.strokeStyle = accentColor;
    ctx.lineWidth = 2;

    if (app.isFlipped) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = accentColor;
    } else {
        ctx.shadowBlur = 6;
        ctx.shadowColor = 'rgba(0, 255, 102, 0.15)';
    }

    ctx.beginPath();
    ctx.roundRect(-cardW / 2, -cardH / 2, cardW, cardH, 16);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.stroke();

    ctx.fillStyle = accentColor;
    ctx.font = 'bold 11px "Courier New", monospace';
    const tagText = "WORD";
    const dirText = app.direction === 'en_to_ja' ? 'EN ➔ JA' : 'JA ➔ EN';
    ctx.fillText(`[ ${tagText} ]  ${dirText}`, -cardW/2 + 20, -cardH/2 + 28);

    ctx.textAlign = 'right';
    const streakEnJa = app.currentItem.correctStreakEnJa || 0;
    const streakJaEn = app.currentItem.correctStreakJaEn || 0;
    
    ctx.fillStyle = '#9ca3af';
    ctx.font = '11px Helvetica, sans-serif';
    ctx.fillText(`英日:${'★'.repeat(streakEnJa)}${'☆'.repeat(3 - streakEnJa)}  日英:${'★'.repeat(streakJaEn)}${'☆'.repeat(3 - streakJaEn)}`, cardW/2 - 20, -cardH/2 + 28);
    ctx.textAlign = 'left';

    if (!app.isFlipped) {
        ctx.fillStyle = '#ffffff';
        if (app.direction === 'en_to_ja') {
            const text = app.currentItem.question;
            ctx.font = 'bold 34px Helvetica, Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(text, 0, 15);
        } else {
            const text = app.getShortAnswer(app.currentItem);
            ctx.font = 'bold 18px "Hiragino Kaku Gothic ProN", Meiryo, sans-serif';
            ctx.textAlign = 'center';
            wrapText(ctx, text, 0, -5, cardW - 40, 26);
        }
    } else {
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';

        const topTextY = -cardH/2 + 55;
        ctx.font = 'bold 16px Helvetica, sans-serif';
        ctx.fillStyle = accentColor;
        ctx.fillText(app.currentItem.question, 0, topTextY);

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        const lineY = topTextY + 12;
        ctx.moveTo(-cardW/2 + 30, lineY);
        ctx.lineTo(cardW/2 - 30, lineY);
        ctx.stroke();

        const lines = app.currentItem.answer.split('\n');
        let startY = lineY + 22;
        
        lines.forEach((line, index) => {
            const trimmedLine = line.trim();
            if (!trimmedLine) return;

            // 対義語・類義語の検出
            if (trimmedLine.startsWith('[') || trimmedLine.startsWith('(')) {
                ctx.fillStyle = '#00E5FF'; // 青みのアクセント
                ctx.font = 'bold 11px "Hiragino Kaku Gothic ProN", Meiryo, sans-serif';
                wrapText(ctx, trimmedLine, 0, startY, cardW - 45, 16);
                startY += 18;
            } 
            // 2行目・3行目の例文情報（1行目は日本語解説なので、index > 0かつアルファベットを含む場合を例文と判定）
            else if (index > 0 && !!trimmedLine.match(/[a-zA-Z]/)) {
                ctx.fillStyle = '#e5e7eb'; // 英語例文は少し明るめ
                ctx.font = 'italic 12px Helvetica, Arial, sans-serif';
                wrapText(ctx, trimmedLine, 0, startY, cardW - 45, 17);
                startY += 20;
            } 
            // 例文の日本語訳（アルファベットを含まない2行目以降）
            else if (index > 0) {
                ctx.fillStyle = '#9ca3af'; // 日本語訳は落ち着いたグレー
                ctx.font = '11px "Hiragino Kaku Gothic ProN", Meiryo, sans-serif';
                wrapText(ctx, trimmedLine, 0, startY, cardW - 45, 16);
                startY += 19;
            } 
            // 1行目の主日本語解説
            else {
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px "Hiragino Kaku Gothic ProN", Meiryo, sans-serif';
                wrapText(ctx, trimmedLine, 0, startY, cardW - 45, 20);
                startY += 24;
            }
        });
    }

    ctx.restore();
}

// コリジョン後等のコンボテキストの描画
function drawComboAnimation() {
    if (app.comboTextAlpha > 0) {
        ctx.save();
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(0, 255, 102, ${app.comboTextAlpha})`;
        
        const fontSize = Math.floor(26 * app.comboTextScale);
        ctx.font = `italic bold ${fontSize}px "Courier New", monospace`;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00FF66';
        
        const textY = layout.cardCenterY - (layout.cardH / 2) - 25;
        ctx.fillText(`x${app.comboCount} Combo!!`, VIEW_WIDTH / 2, textY);
        
        ctx.restore();

        // アニメーション更新
        app.comboTextScale += (1.0 - app.comboTextScale) * 0.15;
        app.comboTextAlpha -= 0.015;
    }
}

function drawInteractiveArea() {
    if (app.isTransitioning) return;

    if (!app.isAnswered) {
        const btnX = 30;
        const btnW = VIEW_WIDTH - 60; 
        const btnH = 54;
        const startY = layout.startY;
        const spacing = 9;

        ctx.textAlign = 'center';
        for (let i = 0; i < 5; i++) {
            const currentBtnY = startY + i * (btnH + spacing);
            const choice = app.choices[i];

            let btnGrad = ctx.createLinearGradient(btnX, currentBtnY, btnX, currentBtnY + btnH);
            btnGrad.addColorStop(0, '#111622');
            btnGrad.addColorStop(1, '#0b0e16');
            ctx.fillStyle = btnGrad;
            
            ctx.strokeStyle = 'rgba(0, 229, 255, 0.2)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.roundRect(btnX, currentBtnY, btnW, btnH, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#00E5FF';
            ctx.font = 'bold 13px "Courier New", monospace';
            ctx.fillText(`${i + 1}`, btnX + 22, currentBtnY + btnH / 2 + 5);

            ctx.strokeStyle = 'rgba(0, 229, 255, 0.15)';
            ctx.beginPath();
            ctx.moveTo(btnX + 40, currentBtnY + 12);
            ctx.lineTo(btnX + 40, currentBtnY + 36);
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'left';
            if (app.direction === 'en_to_ja') {
                ctx.font = 'bold 13.5px "Hiragino Kaku Gothic ProN", Meiryo, sans-serif';
                drawButtonText(ctx, choice.text, btnX + 52, currentBtnY + btnH / 2, btnW - 65, 15);
            } else {
                ctx.font = 'bold 12.5px Helvetica, sans-serif';
                drawButtonText(ctx, choice.text, btnX + 52, currentBtnY + btnH / 2, btnW - 65, 13);
            }
        }
        ctx.textAlign = 'left';
    } 
    else if (app.isFlipped && app.flipProgress === 1) {
        const resultY = layout.resultY;
        const boxW = VIEW_WIDTH - 60;

        ctx.fillStyle = app.selectedChoice.isCorrect ? 'rgba(0, 255, 102, 0.08)' : 'rgba(255, 51, 102, 0.08)';
        ctx.strokeStyle = app.selectedChoice.isCorrect ? '#00FF66' : '#ff3366';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(30, resultY, boxW, 110, 12);
        ctx.fill();
        ctx.stroke();

        ctx.textAlign = 'center';
        if (app.selectedChoice.isCorrect) {
            ctx.fillStyle = '#00FF66';
            ctx.font = 'bold 24px "Hiragino Kaku Gothic ProN", sans-serif';
            
            // コンボ数を正解タイトル横に英語で表示（x連打! -> x Combo!!）
            const comboNote = app.comboCount >= 2 ? ` (${app.comboCount} Combo!!)` : '';
            // 補助テキストがなくなるため、ボックスのほぼ中央（resultY + 65）に配置
            ctx.fillText(`正 解 ！${comboNote}`, VIEW_WIDTH / 2, resultY + 65);
        } else {
            ctx.fillStyle = '#ff3366';
            ctx.font = 'bold 24px "Hiragino Kaku Gothic ProN", sans-serif';
            ctx.fillText('不 正 解', VIEW_WIDTH / 2, resultY + 45);

            ctx.fillStyle = '#ffffff';
            const correctOne = app.choices.find(c => c.isCorrect);
            if (app.direction === 'en_to_ja') {
                ctx.font = 'bold 14px "Hiragino Kaku Gothic ProN", sans-serif';
                ctx.fillText(`正解: ${correctOne.text}`, VIEW_WIDTH / 2, resultY + 80);
            } else {
                ctx.font = 'bold 13px Helvetica, sans-serif';
                ctx.fillText(`正解: ${correctOne.text}`, VIEW_WIDTH / 2, resultY + 80);
            }
        }

        const btnY = layout.btnY;
        const btnW = VIEW_WIDTH - 80; 
        const btnH = 65;
        const btnX = 40;

        let nextGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
        nextGrad.addColorStop(0, '#0e2b19');
        nextGrad.addColorStop(1, '#091c10');
        ctx.fillStyle = nextGrad;
        ctx.strokeStyle = '#00FF66';
        ctx.lineWidth = 2.5;
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'rgba(0, 255, 102, 0.4)';
        ctx.beginPath();
        ctx.roundRect(btnX, btnY, btnW, btnH, 14);
        ctx.fill();
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#33ff88';
        ctx.font = 'bold 18px "Hiragino Kaku Gothic ProN", sans-serif';
        ctx.fillText('次の問題に進む  ▶', VIEW_WIDTH / 2, btnY + 38);
        
        ctx.textAlign = 'left';
    }
}

function updateAndDrawParticles() {
    for (let i = app.particles.length - 1; i >= 0; i--) {
        const p = app.particles[i];
        p.update();
        p.draw(ctx);
        if (p.alpha <= 0) {
            app.particles.splice(i, 1);
        }
    }
}

// ==========================================
// 【モーダル & 拡張システム】
// ==========================================
function openModal() {
    document.getElementById('modal').classList.add('active');
    document.getElementById('importArea').value = "";
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
}

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('active');
    setTimeout(() => {
        toast.classList.remove('active');
    }, 2000);
}

function exportData() {
    const dataStr = JSON.stringify(app.items, null, 2);
    document.getElementById('importArea').value = dataStr;
    document.getElementById('importArea').select();
    document.execCommand('copy');
    showToast("進捗JSONをコピーしました！保管してください");
}

function importData() {
    const text = document.getElementById('importArea').value.trim();
    if (!text) {
        showToast("入力欄が空です");
        return;
    }

    try {
        if (text.startsWith('[')) {
            const parsed = JSON.parse(text);
            if (Array.isArray(parsed)) {
                app.items = parsed.map((item, idx) => {
                    let ans = item.answer || '解説なし';
                    ans = ans.replace(/\\n/g, '\n').replace(/\\r/g, '\r');
                    ans = ans.replace(/￥n/g, '\n').replace(/￥r/g, '\r');
                    return {
                        id: item.id || `custom_${Date.now()}_${idx}`,
                        type: 'word',
                        question: item.question || 'Empty',
                        answer: ans,
                        correctStreakEnJa: Math.max(0, parseInt(item.correctStreakEnJa) || 0),
                        correctStreakJaEn: Math.max(0, parseInt(item.correctStreakJaEn) || 0)
                    };
                });
                showToast(`JSONから ${app.items.length} 件を取り込みました`);
            } else {
                throw new Error("Invalid structure");
            }
        } else {
            const lines = text.split('\n');
            const newItems = [];
            lines.forEach((line, idx) => {
                const parts = line.split(/[\t,]/);
                if (parts.length >= 2) {
                    const question = parts[0].trim();
                    let answer = parts[1].trim();
                    // 手動インポートでも改行コードへの置換をサポート
                    answer = answer.replace(/\\n/g, '\n').replace(/\\r/g, '\r');
                    answer = answer.replace(/￥n/g, '\n').replace(/￥r/g, '\r');
                    
                    newItems.push({
                        id: `custom_${Date.now()}_${idx}`,
                        type: 'word',
                        question: question,
                        answer: answer,
                        correctStreakEnJa: 0,
                        correctStreakJaEn: 0
                    });
                }
            });

            if (newItems.length > 0) {
                app.items = [...app.items, ...newItems];
                showToast(`${newItems.length} 件を追加しました！`);
            } else {
                showToast("有効なデータが見つかりませんでした");
                return;
            }
        }

        app.save();
        app.calculateStats();
        app.pickNextItem(true);
        closeModal();
    } catch (e) {
        showToast("形式エラー：正しく読み込めませんでした");
    }
}

function wrapText(context, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    let currentY = y;

    if (text.match(/[\u3000-\u303f\u3040-\u309f\u30a0-\u30ff\uff00-\uff9f\u4e00-\u9faf]/)) {
        let chars = text.split('');
        for (let n = 0; n < chars.length; n++) {
            let testLine = line + chars[n];
            let metrics = context.measureText(testLine);
            let testWidth = metrics.width;
            if (testWidth > maxWidth && n > 0) {
                context.fillText(line, x, currentY);
                line = chars[n];
                currentY += lineHeight;
            } else {
                line = testLine;
            }
        }
        context.fillText(line, x, currentY);
        return;
    }

    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        let metrics = context.measureText(testLine);
        let testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
            context.fillText(line, x, currentY);
            line = words[n] + ' ';
            currentY += lineHeight;
        } else {
            line = testLine;
        }
    }
    context.fillText(line, x, currentY);
}

function gameLoop() {
    drawApp();
    requestAnimationFrame(gameLoop);
}
