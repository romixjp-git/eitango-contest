<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>英単語コンテスト Smart Learner Pro</title>
    <!-- プレミアムアイコン用 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #08090c;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* iPhoneの画面にぴったりとフィットさせるレスポンシブコンテナ */
        #container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            max-width: 480px;
            max-height: 850px;
            background-color: #0d1117;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        @media (min-width: 480px) and (min-height: 850px) {
            #container {
                border: 1px solid #1f2937;
                border-radius: 24px;
            }
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #0b0c10;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .header-buttons {
            position: absolute;
            top: calc(15px + env(safe-area-inset-top, 0px));
            right: 15px;
            display: flex;
            gap: 8px;
            pointer-events: auto;
            z-index: 10;
        }
        .btn-ui {
            background: rgba(31, 41, 55, 0.85);
            border: 1px solid #374151;
            color: #9ca3af;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-ui:hover, .btn-ui:active {
            border-color: #00FF66;
            color: #00FF66;
            background: rgba(0, 255, 102, 0.1);
        }

        /* スライドインサイドメニュー */
        .side-menu {
            position: absolute;
            top: 0;
            right: -290px; /* 初期状態は隠す */
            width: 290px;
            height: 100%;
            background: #0d1117;
            border-left: 1px solid #1f2937;
            z-index: 40;
            transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            padding: calc(20px + env(safe-area-inset-top, 0px)) 20px calc(20px + env(safe-area-inset-bottom, 0px)) 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
            box-shadow: -5px 0 25px rgba(0,0,0,0.6);
        }
        .side-menu.active {
            right: 0;
        }
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2937;
            padding-bottom: 12px;
        }
        .menu-header h3 {
            margin: 0;
            color: #00E5FF;
            font-size: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .menu-close {
            color: #9ca3af;
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
            padding: 4px;
        }
        .menu-close:hover {
            color: #ff3366;
        }
        .menu-scroll-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-right: 2px;
        }
        .menu-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .menu-section h4 {
            margin: 0;
            color: #9ca3af;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 6px;
        }
        .btn-menu-action {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #374151;
            background: #111622;
            color: #ffffff;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-menu-action:hover {
            border-color: #00FF66;
            color: #00FF66;
            background: rgba(0, 255, 102, 0.05);
        }
        .btn-reset-danger {
            border-color: #ff3366;
            color: #ff3366;
            background: rgba(255, 51, 102, 0.03);
        }
        .btn-reset-danger:hover, .btn-reset-danger:active {
            border-color: #ff3366;
            color: #ffffff;
            background: #ff3366;
        }
        
        /* 範囲選択リスト */
        .range-actions {
            display: flex;
            gap: 6px;
            margin-bottom: 4px;
        }
        .btn-mini {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            color: #9ca3af;
            font-size: 10px;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-mini:hover {
            border-color: #00E5FF;
            color: #00E5FF;
        }
        .range-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 480px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .range-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            font-size: 12px;
            cursor: pointer;
            background: #161b22;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #21262d;
            transition: all 0.2s;
        }
        .range-item:hover {
            border-color: #30363d;
            background: #21262d;
        }
        .range-item input[type="checkbox"] {
            cursor: pointer;
            accent-color: #00FF66;
            width: 16px;
            height: 16px;
        }

        /* インゲームトースト通知 */
        #toast {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 229, 255, 0.95);
            color: #05070a;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4);
            z-index: 30;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
        }
        #toast.active {
            opacity: 1;
            transform: translate(-50%, -10px);
        }
    </style>
</head>
<body>

<div id="container">
    <div class="header-buttons">
        <!-- ハンバーガーメニューボタン -->
        <button class="btn-ui" onclick="toggleMenu(event)"><i class="fa-solid fa-bars"></i></button>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    <div id="ui-overlay"></div>

    <!-- 設定サイドメニュー -->
    <div id="sideMenu" class="side-menu" onclick="event.stopPropagation()">
        <div class="menu-header">
            <h3><i class="fa-solid fa-sliders"></i> 出題設定</h3>
            <span class="menu-close" onclick="toggleMenu(event)">&times;</span>
        </div>
        
        <div class="menu-scroll-content">
            <!-- 出題範囲設定（100件区切り） -->
            <div class="menu-section">
                <h4>出題範囲（100件ごと）</h4>
                <div class="range-actions">
                    <button class="btn-mini" onclick="selectAllRanges(true)">全選択</button>
                    <button class="btn-mini" onclick="selectAllRanges(false)">全解除</button>
                </div>
                <div id="rangeContainer" class="range-list">
                    <!-- CSVロード後に動的生成 -->
                </div>
            </div>

            <!-- 進捗データクリア -->
            <div class="menu-section" style="margin-top: auto; padding-top: 15px;">
                <h4>データ管理</h4>
                <button class="btn-menu-action btn-reset-danger" onclick="resetProgressWithConfirm()"><i class="fa-solid fa-rotate-right"></i> 学習進捗をリセット</button>
            </div>
        </div>
    </div>
    
    <div id="toast">保存しました！</div>
</div>

<script>
// ==========================================
// 【初期学習データ設定：英単語コンテスト（フォールバック用）】
// ==========================================
const INITIAL_DATA_SOURCE = [
    { id: "w1", type: "word", page: "232", question: "achieve", answer: "〜を達成する、成し遂げる\nShe achieved her goal of becoming a doctor.\n彼女は医師になるという目標を達成した。" },
    { id: "w2", type: "word", page: "233", question: "admire", answer: "〜に感嘆する、〜を称賛する\nI admire his courage to speak the truth.\n私は真実を話す彼の勇기에感心する。" },
    { id: "w3", type: "word", page: "66", question: "allow", answer: "〜を許可する、許す\nMy parents allowed me to study abroad.\n両親は私が留学することを許してくれた。" },
    { id: "w4", type: "word", page: "66", question: "announce", answer: "〜を発表する、告知する\nThe company announced a new product today.\n会社は本日、新製品を発表した。" },
    { id: "w5", type: "word", page: "71", question: "apologize", answer: "謝る、お詫びする\nHe apologized to her for being late.\n彼は遅刻したことを彼女に謝った。" },
    { id: "w6", type: "word", page: "71", question: "avoid", answer: "〜を避ける、回避する\nYou should avoid making hasty decisions.\n焦って決定を下すのは避けるべきだ。" },
    { id: "w7", type: "word", page: "164", question: "behavior", answer: "ふるまい、行動、態度\nHis behavior at the school was excellent.\n学校での彼の態度は極めて立派だった。" },
    { id: "w8", type: "word", page: "164", question: "benefit", answer: "利益、恩恵、〜の利益になる\nRegular exercise benefits our physical health.\n定期的な運動は身体の健康にプラスになる。" },
    { id: "w9", type: "word", page: "174", question: "complain", answer: "不平を言う、苦情を言う\nThey complained about the noisy neighbors.\n彼らは近所の騒音について不満を言った。" },
    { id: "w10", type: "word", page: "174", question: "convenient", answer: "都合が良い、便利な\nIs tomorrow convenient for our meeting?\n明日は打ち合わせをするのに都合が良いですか？\n[対義語] inconvenient" },
    { id: "w11", type: "word", page: "226", question: "decrease", answer: "減少する、〜を減らす\nThe population of this village is decreasing.\nこの村の人口は減少している。\n[対義語] increase" },
    { id: "w12", type: "word", page: "226", question: "delay", answer: "〜を遅らせる、延期する\nThe flight was delayed due to bad weather.\n悪天候のためフライトが遅れた。" },
    { id: "w13", type: "word", page: "270", question: "demand", answer: "〜を要求する、需要\nThere is a high demand for organic vegetables.\n有機野菜に対する高い需要がある。\n[対義語] supply" },
    { id: "w14", type: "word", page: "270", question: "encourage", answer: "〜を勇気づける、励ます\nMy teacher encouraged me to keep writing.\n先生は私に書き続けるよう励ましてくれた。\n[対義語] discourage" },
    { id: "w15", type: "word", page: "317", question: "environment", answer: "環境\nWe must do more to protect the environment.\n私たちは環境を守るためにもっと行動すべきだ。" },
    { id: "w16", type: "word", page: "317", question: "frequently", answer: "頻繁に、しばしば\nHe frequently visits the local library.\n彼は頻繁に地元の図書館を訪れる。" },
    { id: "w17", type: "word", page: "322", question: "government", answer: "政府、政治\nThe government plans to lower income taxes.\n政府は所得税を引き下げる計画をしている。" },
    { id: "w18", type: "word", page: "322", question: "gradually", answer: "徐々に、だんだんと\nThe weather is gradually getting warmer.\n気温は徐々に暖かくなってきている。" },
    { id: "w19", type: "word", page: "390", question: "ignore", answer: "〜を無視する、知らないふりをする\nShe ignored my advice and made a mistake.\n彼女は私の助言を無視して失敗した。" },
    { id: "w20", type: "word", page: "390", question: "improve", answer: "〜を改善する、上達させる\nI want to improve my English speaking skills.\n英語の英会話力を向上させたい。" }
];

// 論理解像度
const VIEW_WIDTH = 480;
const VIEW_HEIGHT = 850;

// 動的レイアウト計算用
let layout = {
    scale: 1,
    height: VIEW_HEIGHT,
    safeAreaTop: 15,
    safeAreaBottom: 15,
    headerBottom: 130,  
    cardCenterY: 290,   
    cardH: 220,         
    startY: 445,        
    btnY: 710,   
    resultY: 575 
};

let isInitialized = false;

// 選択肢ボタン内の自動改行 & センタリング
function drawButtonText(context, text, startX, centerY, maxWidth, baseLineHeight) {
    const isJapanese = !!text.match(/[\u3000-\u303f\u3040-\u309f\u30a0-\u30ff\uff00-\uff9f\u4e00-\u9faf]/);
    let lines = [];
    
    if (isJapanese) {
        let chars = text.split('');
        let currentLine = '';
        for (let i = 0; i < chars.length; i++) {
            let testLine = currentLine + chars[i];
            let metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && i > 0) {
                lines.push(currentLine);
                currentLine = chars[i];
            } else {
                currentLine = testLine;
            }
        }
        lines.push(currentLine);
    } else {
        let words = text.split(' ');
        let currentLine = '';
        for (let i = 0; i < words.length; i++) {
            let testLine = currentLine + (currentLine ? ' ' : '') + words[i];
            let metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && i > 0) {
                lines.push(currentLine);
                currentLine = words[i];
            } else {
                currentLine = testLine;
            }
        }
        lines.push(currentLine);
    }

    const totalHeight = lines.length * baseLineHeight;
    let startY = centerY - (totalHeight / 2) + (baseLineHeight / 2) + 3;

    for (let i = 0; i < lines.length; i++) {
        context.fillText(lines[i], startX, startY + i * baseLineHeight);
    }
}

// ==========================================
// 【アプリケーション状態管理】
// ==========================================
class AppState {
    constructor() {
        this.rawDataSource = []; // すべてのロード済み単語データ
        this.items = [];         // 現在のアクティブな単語リスト
        this.enabledRanges = []; // 100件グループごとのON/OFFステート
        
        this.currentItem = null;
        this.direction = 'en_to_ja'; 
        this.choices = [];      
        this.isAnswered = false; 
        this.selectedChoice = null; 
        
        this.isFlipped = false; 
        this.flipProgress = 0;  
        this.flipDirection = 1; 
        this.isTransitioning = false; 
        this.cardOffsetPercent = 0;  

        this.particles = [];    
        this.learningRate = 0;  
        this.targetLearningRate = 0; 

        // コンボ機能用ステート
        this.comboCount = 0;
        this.comboTextScale = 0;
        this.comboTextAlpha = 0;
        
        this.stats = {
            total: 0,
            mastered: 0,
            streakMax: 3
        };
    }

    // 初期化を同期的に行い、フリーズを防止
    initSync() {
        // ロード中はまずフォールバック用のデフォルトデータでゲームを即座に動かせるようにする
        this.rawDataSource = INITIAL_DATA_SOURCE;
        this.buildRangeSelector();
        this.applyRangeFilter(true);
    }

    // バックグラウンドで非ブロッキングかつ安全にCSVを非同期フェッチして更新
    async fetchCSVBackground() {
        try {
            const response = await fetch('word.csv');
            if (response.ok) {
                let csvText = await response.text();
                csvText = csvText.replace(/^\uFEFF/, ''); // UTF-8 BOMをクリア
                const parsedData = this.parseCSV(csvText);
                if (parsedData && parsedData.length > 0) {
                    this.rawDataSource = parsedData;
                    // チェックボックスとフィルタを最新データに置き換えてシームレスに同期
                    this.buildRangeSelector();
                    this.applyRangeFilter(false);
                    showToast(`単語リストを読み込みました (${this.rawDataSource.length}語)`);
                }
            }
        } catch (e) {
            // 通信エラーや未配置の際もフォールバックでゲームは動き続けます
        }
    }

    // ページ番号付き新CSV形式のパース対応
    parseCSV(text) {
        const lines = text.split(/\r?\n/);
        const result = [];
        let index = 1;
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            
            let parts = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if ((char === ',' || char === '\t') && !inQuotes) {
                    parts.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            parts.push(current.trim());

            if (parts.length >= 3) {
                const page = parts[0].replace(/^"|"$/g, '').trim();
                const q = parts[1].replace(/^"|"$/g, '').trim();
                const meaning = parts[2].replace(/^"|"$/g, '').trim();

                // ヘッダー行などのスキップ処理
                if (q.toLowerCase() === 'word' || q === '単語' || q === '英語') {
                    continue;
                }

                const engExample = parts[3] ? parts[3].replace(/^"|"$/g, '').trim() : '';
                const japExample = parts[4] ? parts[4].replace(/^"|"$/g, '').trim() : '';
                const antonym = parts[5] ? parts[5].replace(/^"|"$/g, '').trim() : '';
                
                if (q && meaning) {
                    let answerLines = [meaning];
                    if (engExample) answerLines.push(engExample);
                    if (japExample) answerLines.push(japExample);
                    if (antonym) answerLines.push(antonym);

                    let a = answerLines.join('\n');
                    
                    // 改行コードの置換
                    a = a.replace(/\\n/g, '\n').replace(/\\r/g, '\r');
                    a = a.replace(/￥n/g, '\n').replace(/￥r/g, '\r');
                    
                    result.push({
                        id: `csv_w_${index++}`,
                        type: "word",
                        page: page,
                        question: q,
                        answer: a
                    });
                }
            }
        }
        return result;
    }

    // 100件ごとの範囲リストをUIに構築
    buildRangeSelector() {
        const totalWords = this.rawDataSource.length;
        const rangeSize = 100;
        const numRanges = Math.ceil(totalWords / rangeSize);
        
        let savedRanges = null;
        const saved = localStorage.getItem('eitango_enabled_ranges');
        if (saved) {
            try {
                savedRanges = JSON.parse(saved);
            } catch(e) {}
        }

        this.enabledRanges = [];
        for (let i = 0; i < numRanges; i++) {
            const isEnabled = savedRanges ? !!savedRanges[i] : true;
            this.enabledRanges.push(isEnabled);
        }

        const container = document.getElementById('rangeContainer');
        container.innerHTML = '';

        for (let i = 0; i < numRanges; i++) {
            const start = i * rangeSize + 1;
            const end = Math.min((i + 1) * rangeSize, totalWords);
            
            const item = document.createElement('label');
            item.className = 'range-item';
            
            // チェックボックスおよびラベル自体のタップが外に伝搬してメニューが閉じるのを防止
            item.addEventListener('click', (e) => {
                e.stopPropagation();
            });
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = this.enabledRanges[i];
            checkbox.dataset.index = i;
            checkbox.addEventListener('change', (e) => {
                e.stopPropagation();
                this.toggleRange(i, e.target.checked);
            });

            const text = document.createTextNode(` No.${start} - ${end}`);
            item.appendChild(checkbox);
            item.appendChild(text);
            container.appendChild(item);
        }
    }

    toggleRange(index, checked) {
        this.enabledRanges[index] = checked;
        localStorage.setItem('eitango_enabled_ranges', JSON.stringify(this.enabledRanges));
        this.applyRangeFilter(false);
    }

    selectAllRanges(checked) {
        this.enabledRanges = this.enabledRanges.map(() => checked);
        localStorage.setItem('eitango_enabled_ranges', JSON.stringify(this.enabledRanges));
        
        const checkboxes = document.querySelectorAll('#rangeContainer input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = checked);
        
        this.applyRangeFilter(false);
    }

    // 出題範囲チェックボックスの設定に基づいてアクティブリストを構築
    applyRangeFilter(isInitial = false) {
        const rangeSize = 100;
        let filtered = [];

        this.rawDataSource.forEach((item, idx) => {
            const rangeIndex = Math.floor(idx / rangeSize);
            if (this.enabledRanges[rangeIndex]) {
                filtered.push(item);
            }
        });

        // どこも選ばれていない場合は安全のために最初の範囲を強制ON
        if (filtered.length === 0 && this.rawDataSource.length > 0) {
            this.enabledRanges[0] = true;
            localStorage.setItem('eitango_enabled_ranges', JSON.stringify(this.enabledRanges));
            const firstCheckbox = document.querySelector('#rangeContainer input[type="checkbox"]');
            if (firstCheckbox) firstCheckbox.checked = true;
            
            filtered = this.rawDataSource.slice(0, Math.min(rangeSize, this.rawDataSource.length));
            showToast("出題範囲は最低1グループ選択してください");
        }

        // ローカルストレージの進捗読み込み
        const savedData = localStorage.getItem('eiken_pre2_progress_v4');
        let parsed = [];
        if (savedData) {
            try {
                parsed = JSON.parse(savedData);
            } catch (e) {}
        }

        // フィルタされたリストに適合する進捗データをマップ
        this.items = filtered.map(dItem => {
            const matched = parsed.find(p => p.question === dItem.question);
            return {
                ...dItem,
                correctStreakEnJa: matched ? Math.max(0, parseInt(matched.correctStreakEnJa) || 0) : 0,
                correctStreakJaEn: matched ? Math.max(0, parseInt(matched.correctStreakJaEn) || 0) : 0
            };
        });

        this.calculateStats();
        if (isInitial) {
            this.learningRate = this.targetLearningRate;
        }
        this.pickNextItem(true);
    }

    loadDefaultData(source) {
        this.items = source.map(item => ({
            ...item,
            correctStreakEnJa: 0,
            correctStreakJaEn: 0
        }));
    }

    save() {
        const savedData = localStorage.getItem('eiken_pre2_progress_v4');
        let progressList = [];
        if (savedData) {
            try {
                progressList = JSON.parse(savedData);
            } catch (e) {}
        }

        this.items.forEach(item => {
            const idx = progressList.findIndex(p => p.question === item.question);
            if (idx >= 0) {
                progressList[idx] = {
                    question: item.question,
                    correctStreakEnJa: item.correctStreakEnJa,
                    correctStreakJaEn: item.correctStreakJaEn
                };
            } else {
                progressList.push({
                    question: item.question,
                    correctStreakEnJa: item.correctStreakEnJa,
                    correctStreakJaEn: item.correctStreakJaEn
                });
            }
        });

        localStorage.setItem('eiken_pre2_progress_v4', JSON.stringify(progressList));
    }

    reset() {
        const clearedProgress = this.rawDataSource.map(item => ({
            question: item.question,
            correctStreakEnJa: 0,
            correctStreakJaEn: 0
        }));
        localStorage.setItem('eiken_pre2_progress_v4', JSON.stringify(clearedProgress));

        this.items.forEach(item => {
            item.correctStreakEnJa = 0;
            item.correctStreakJaEn = 0;
        });

        this.comboCount = 0;
        this.calculateStats();
        this.isFlipped = false;
        this.flipProgress = 0;
        this.isAnswered = false;
        this.selectedChoice = null;
        this.pickNextItem(true);
    }

    calculateStats() {
        this.stats.total = this.items.length;
        this.stats.mastered = this.items.filter(item => 
            item.correctStreakEnJa >= this.stats.streakMax && 
            item.correctStreakJaEn >= this.stats.streakMax
        ).length;
        
        let totalProgressPoints = 0;
        this.items.forEach(item => {
            totalProgressPoints += Math.min(this.stats.streakMax, item.correctStreakEnJa);
            totalProgressPoints += Math.min(this.stats.streakMax, item.correctStreakJaEn);
        });
        
        const maxPoints = this.stats.total * this.stats.streakMax * 2;
        this.targetLearningRate = maxPoints > 0 ? (totalProgressPoints / maxPoints) * 100 : 0;
    }

    getShortAnswer(item) {
        return item.answer.split('\n')[0];
    }

    pickNextItem(isInitial = false) {
        if (this.items.length === 0) return;

        const unmasteredItems = this.items.filter(item => 
            item.correctStreakEnJa < this.stats.streakMax || 
            item.correctStreakJaEn < this.stats.streakMax
        );
        const masteredItems = this.items.filter(item => 
            item.correctStreakEnJa >= this.stats.streakMax && 
            item.correctStreakJaEn >= this.stats.streakMax
        );

        if (unmasteredItems.length > 0) {
            if (masteredItems.length > 0 && Math.random() < 0.05) {
                const idx = Math.floor(Math.random() * masteredItems.length);
                this.currentItem = masteredItems[idx];
            } else {
                let pool = [];
                unmasteredItems.forEach(item => {
                    const avgStreak = (item.correctStreakEnJa + item.correctStreakJaEn) / 2;
                    let weight = 3;
                    if (avgStreak >= 1 && avgStreak < 2) weight = 2;
                    if (avgStreak >= 2) weight = 1.2;

                    for (let i = 0; i < weight * 10; i++) {
                        pool.push(item);
                    }
                });
                const idx = Math.floor(Math.random() * pool.length);
                this.currentItem = pool[idx];
            }
        } else {
            const idx = Math.floor(Math.random() * this.items.length);
            this.currentItem = this.items[idx];
        }

        const needEnJa = this.currentItem.correctStreakEnJa < this.stats.streakMax;
        const needJaEn = this.currentItem.correctStreakJaEn < this.stats.streakMax;

        if (needEnJa && !needJaEn) {
            this.direction = 'en_to_ja';
        } else if (!needEnJa && needJaEn) {
            this.direction = 'ja_to_en';
        } else {
            this.direction = Math.random() < 0.5 ? 'en_to_ja' : 'ja_to_en';
        }

        this.choices = [];

        if (this.direction === 'en_to_ja') {
            const correctText = this.getShortAnswer(this.currentItem);
            this.choices.push({ text: correctText, isCorrect: true, id: this.currentItem.id });

            let candidates = this.items.filter(item => item.id !== this.currentItem.id);
            candidates.sort(() => Math.random() - 0.5);

            for (let i = 0; i < Math.min(4, candidates.length); i++) {
                this.choices.push({
                    text: this.getShortAnswer(candidates[i]),
                    isCorrect: false,
                    id: candidates[i].id
                });
            }
        } else {
            const correctText = this.currentItem.question;
            this.choices.push({ text: correctText, isCorrect: true, id: this.currentItem.id });

            let candidates = this.items.filter(item => item.id !== this.currentItem.id);
            candidates.sort(() => Math.random() - 0.5);

            for (let i = 0; i < Math.min(4, candidates.length); i++) {
                this.choices.push({
                    text: candidates[i].question,
                    isCorrect: false,
                    id: candidates[i].id
                });
            }
        }

        while (this.choices.length < 5) {
            this.choices.push({ text: "--- (データ不足) ---", isCorrect: false, id: "dummy" });
        }

        this.choices.sort(() => Math.random() - 0.5);

        this.isFlipped = false;
        this.flipProgress = 0;
        this.isAnswered = false;
        this.selectedChoice = null;
        this.cardOffsetPercent = isInitial ? 0 : 100; 
    }

    selectChoice(choice) {
        if (this.isAnswered || this.isTransitioning) return;

        this.isAnswered = true;
        this.selectedChoice = choice;

        if (choice.isCorrect) {
            if (this.direction === 'en_to_ja') {
                this.currentItem.correctStreakEnJa += 1;
            } else {
                this.currentItem.correctStreakJaEn += 1;
            }
            
            this.comboCount += 1;
            
            // コンボに応じたエフェクト調整 (1〜5段階)
            const power = Math.min(5, this.comboCount);
            const particleCount = 15 + power * 15; 
            const speedMultiplier = 1 + power * 0.3; 
            
            createConfetti(VIEW_WIDTH / 2, layout.cardCenterY, '#00FF66', particleCount, speedMultiplier);

            if (this.comboCount >= 2) {
                this.comboTextScale = 0.4;
                this.comboTextAlpha = 1.0;
            }
        } else {
            if (this.direction === 'en_to_ja') {
                this.currentItem.correctStreakEnJa = 0;
            } else {
                this.currentItem.correctStreakJaEn = 0;
            }
            this.comboCount = 0; 
            createConfetti(VIEW_WIDTH / 2, layout.cardCenterY, '#ff3366', 20, 1.0);
        }

        this.save();
        this.calculateStats();

        this.flipDirection = 1;
        let flipTimer = 0;
        const flipDuration = 10;
        const self = this;
        
        function animateFlip() {
            flipTimer++;
            self.flipProgress = flipTimer / flipDuration;

            if (flipTimer === Math.floor(flipDuration / 2)) {
                self.isFlipped = true;
            }

            if (flipTimer < flipDuration) {
                requestAnimationFrame(animateFlip);
            } else {
                self.flipProgress = 1;
            }
        }
        animateFlip();
    }

    nextQuestion() {
        if (this.isTransitioning) return;
        this.isTransitioning = true;
        
        let slideTimer = 0;
        const slideDuration = 12;
        const self = this;

        function animateTransition() {
            slideTimer++;
            self.cardOffsetPercent = -(slideTimer / slideDuration) * 100;

            if (slideTimer >= slideDuration) {
                self.pickNextItem(false); 
                self.isTransitioning = false;
                
                let slideInTimer = 0;
                const slideInDuration = 10;
                function animateSlideIn() {
                    slideInTimer++;
                    self.cardOffsetPercent = 100 - (slideInTimer / slideInDuration) * 100;
                    if (slideInTimer < slideInDuration) {
                        requestAnimationFrame(animateSlideIn);
                    } else {
                        self.cardOffsetPercent = 0;
                    }
                }
                animateSlideIn();
            } else {
                requestAnimationFrame(animateTransition);
            }
        }
        animateTransition();
    }
}

// 【Canvas 初期セットアップ】

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const app = new AppState();

function resizeCanvas() {
    const container = document.getElementById('container');
    const rect = container.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
}

// Y座標・セーフエリアをデバイスごとに最適調整
function updateLayout() {
    const container = document.getElementById('container');
    const rect = container.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return false;

    const scale = rect.width / VIEW_WIDTH;
    const computedHeight = rect.height / scale;

    if (isNaN(scale) || !isFinite(scale) || isNaN(computedHeight) || !isFinite(computedHeight)) {
        return false;
    }

    layout.scale = scale;
    layout.height = computedHeight;
    isInitialized = true;
    
    const aspectRatio = rect.height / rect.width;
    const hasNotch = aspectRatio > 1.8;
    layout.safeAreaTop = hasNotch ? 45 : 15;
    layout.safeAreaBottom = hasNotch ? 35 : 15;
    
    layout.headerBottom = layout.safeAreaTop + 110; 
    
    const btnH = 54;
    const spacing = 9;
    const totalButtonsHeight = 5 * btnH + 4 * spacing; 
    layout.startY = layout.height - layout.safeAreaBottom - totalButtonsHeight;
    
    layout.btnY = layout.height - layout.safeAreaBottom - 15 - 65; 
    layout.resultY = layout.btnY - 15 - 110; 
    
    if (!app.isAnswered) {
        const availableSpace = layout.startY - layout.headerBottom;
        layout.cardCenterY = layout.headerBottom + availableSpace / 2 - 8;
        layout.cardH = Math.min(220, availableSpace - 16);
    } else {
        const availableSpace = layout.resultY - layout.headerBottom;
        layout.cardCenterY = layout.headerBottom + availableSpace / 2 - 8;
        layout.cardH = Math.min(220, availableSpace - 16);
    }
    return true;
}

window.addEventListener('resize', resizeCanvas);
window.addEventListener('load', () => {
    resizeCanvas();
    // 1. 同期的にゲームを即開始可能な状態にする
    app.initSync();
    gameLoop();
    // 2. バックグラウンドでword.csvを非ブロッキングフェッチ
    app.fetchCSVBackground();
});

function getRelativeCoords(event) {
    const rect = canvas.getBoundingClientRect();
    const clientX = event.touches ? event.touches[0].clientX : event.clientX;
    const clientY = event.touches ? event.touches[0].clientY : event.clientY;
    
    const touchX = clientX - rect.left;
    const touchY = clientY - rect.top;
    
    return {
        x: touchX / layout.scale,
        y: touchY / layout.scale
    };
}

// ==========================================
// 【アニメーション & パーティクル】
// ==========================================
class Particle {
    constructor(x, y, color, speedMultiplier = 1) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = Math.random() * 5 + 2;
        this.speedX = (Math.random() - 0.5) * 10 * speedMultiplier;
        this.speedY = (Math.random() - 0.8) * 12 * speedMultiplier - 2;
        this.gravity = 0.22;
        this.alpha = 1;
        this.life = Math.random() * 25 + 25;
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.alpha -= 1 / this.life;
        if (this.alpha < 0) this.alpha = 0;
    }

    draw(context) {
        context.save();
        context.globalAlpha = this.alpha;
        context.fillStyle = this.color;
        context.shadowBlur = 10;
        context.shadowColor = this.color;
        context.beginPath();
        context.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        context.fill();
        context.restore();
    }
}

function createConfetti(x, y, color, count = 20, speedMultiplier = 1) {
    for (let i = 0; i < count; i++) {
        app.particles.push(new Particle(x, y, color, speedMultiplier));
    }
}

// ==========================================
// 【インタラクション制御】
// ==========================================
let isTouchProcessing = false; // 二重発火および競合防止フラグ

function handleInteraction(coords) {
    // もしスライドメニューが開いている場合は、メニューを閉じることを優先
    const menu = document.getElementById('sideMenu');
    if (menu.classList.contains('active')) {
        menu.classList.remove('active');
        return; // メニューを閉じるタップ時は回答判定をスキップ
    }

    if (app.isTransitioning || !isInitialized) return;

    const { x, y } = coords;

    if (!app.isAnswered) {
        const btnX = 30;
        const btnW = VIEW_WIDTH - 60; 
        const btnH = 54;
        const startY = layout.startY;
        const spacing = 9;

        for (let i = 0; i < 5; i++) {
            const currentBtnY = startY + i * (btnH + spacing);
            if (x >= btnX && x <= btnX + btnW && y >= currentBtnY && y <= currentBtnY + btnH) {
                app.selectChoice(app.choices[i]);
                return;
            }
        }
    }

    if (app.isAnswered && app.isFlipped && app.flipProgress === 1) {
        const btnY = layout.btnY;
        const btnW = VIEW_WIDTH - 80;
        const btnH = 65;
        const btnX = 40;
        if (y >= btnY && y <= btnY + btnH && x >= btnX && x <= btnX + btnW) {
            app.nextQuestion();
        }
    }
}

// touchstartとmousedownの二重発火を完全に防止
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    isTouchProcessing = true;
    const coords = getRelativeCoords(e);
    handleInteraction(coords);
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
    if (isTouchProcessing) {
        // すでにタッチで処理した場合は無視してフラグをリセット
        isTouchProcessing = false;
        return;
    }
    const coords = getRelativeCoords(e);
    handleInteraction(coords);
});

// ==========================================
// 【描画処理】
// ==========================================
function drawApp() {
    if (!updateLayout() || !isInitialized) return;

    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.restore();

    ctx.save();
    ctx.scale(layout.scale, layout.scale);
    
    drawBackground();
    drawHeader();
    drawCard();
    drawInteractiveArea();
    drawComboAnimation();
    updateAndDrawParticles();
    
    ctx.restore();
}

function drawBackground() {
    if (!isInitialized || isNaN(layout.height) || !isFinite(layout.height)) {
        ctx.fillStyle = '#0a0d14';
        ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
        return;
    }
    
    let bgGrad = ctx.createLinearGradient(0, 0, 0, layout.height);
    bgGrad.addColorStop(0, '#0a0d14');
    bgGrad.addColorStop(1, '#05070a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, VIEW_WIDTH, layout.height);

    ctx.strokeStyle = 'rgba(0, 255, 102, 0.015)';
    ctx.lineWidth = 1;
    for (let i = 0; i < VIEW_WIDTH; i += 30) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, layout.height);
        ctx.stroke();
    }
    for (let j = 0; j < layout.height; j += 30) {
        ctx.beginPath();
        ctx.moveTo(0, j);
        ctx.lineTo(VIEW_WIDTH, j);
        ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(0, 229, 255, 0.08)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(20, layout.safeAreaTop + 35);
    ctx.lineTo(VIEW_WIDTH - 20, layout.safeAreaTop + 35);
    ctx.stroke();
}

function drawHeader() {
    const top = layout.safeAreaTop;
    
    ctx.fillStyle = '#00FF66';
    ctx.font = 'bold 11px "Courier New", monospace';
    ctx.fillText('VOCABULARY CONTEST : SMART LEARNER PRO', 30, top + 15);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 20px Helvetica, Arial, sans-serif';
    ctx.fillText('学習進捗率', 30, top + 55);

    const diff = app.targetLearningRate - app.learningRate;
    app.learningRate += diff * 0.1;
    const displayRate = app.learningRate.toFixed(1);

    ctx.textAlign = 'right';
    ctx.fillStyle = '#00E5FF';
    ctx.font = 'italic bold 28px "Courier New", monospace';
    ctx.fillText(`${displayRate}%`, VIEW_WIDTH - 30, top + 55);
    ctx.textAlign = 'left';

    const barX = 30;
    const barY = top + 72;
    const barW = VIEW_WIDTH - 60;
    const barH = 10;

    ctx.fillStyle = '#111827';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, 5);
    ctx.fill();

    const fillW = (app.learningRate / 100) * barW;
    if (fillW > 0) {
        let grad = ctx.createLinearGradient(barX, barY, barX + barW, barY);
        grad.addColorStop(0, '#00FF66');
        grad.addColorStop(1, '#00E5FF');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(barX, barY, fillW, barH, 5);
        ctx.fill();

        ctx.shadowBlur = 8;
        ctx.shadowColor = '#00E5FF';
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(barX + fillW, barY + barH/2, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    ctx.fillStyle = '#4b5563';
    ctx.font = '11px Helvetica, sans-serif';
    ctx.fillText(`MASTERED: ${app.stats.mastered} / ${app.stats.total} words`, 32, top + 98);

    ctx.textAlign = 'right';
    if (app.comboCount >= 1) {
        ctx.fillStyle = '#00FF66';
        ctx.font = 'bold 11px Helvetica, sans-serif';
        ctx.fillText(`CURRENT COMBO: ${app.comboCount}`, VIEW_WIDTH - 32, top + 98);
    } else {
        ctx.fillStyle = '#4b5563';
        ctx.fillText(`TOTAL: ${app.stats.total} words`, VIEW_WIDTH - 32, top + 98);
    }
    ctx.textAlign = 'left';
}

function drawCard() {
    if (!app.currentItem) return;

    ctx.save();

    const cardX = VIEW_WIDTH / 2;
    const cardY = layout.cardCenterY; 
    const cardW = 420;
    const cardH = layout.cardH; 

    const slideOffset = (app.cardOffsetPercent / 100) * VIEW_WIDTH;
    ctx.translate(cardX + slideOffset, cardY);

    const scaleX = Math.abs(Math.cos(app.flipProgress * Math.PI));
    ctx.scale(scaleX, 1);

    let cardGrad = ctx.createLinearGradient(0, -cardH/2, 0, cardH/2);
    if (app.isFlipped) {
        cardGrad.addColorStop(0, '#151c28');
        cardGrad.addColorStop(1, '#0a0d14');
    } else {
        cardGrad.addColorStop(0, '#111827');
        cardGrad.addColorStop(1, '#0d1117');
    }
    ctx.fillStyle = cardGrad;

    const accentColor = '#00FF66';
    ctx.strokeStyle = accentColor;
    ctx.lineWidth = 2;

    if (app.isFlipped) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = accentColor;
    } else {
        ctx.shadowBlur = 6;
        ctx.shadowColor = 'rgba(0, 255, 102, 0.15)';
    }

    ctx.beginPath();
    ctx.roundRect(-cardW / 2, -cardH / 2, cardW, cardH, 16);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.stroke();

    ctx.fillStyle = accentColor;
    ctx.font = 'bold 11px "Courier New", monospace';
    const tagText = "WORD";
    const dirText = app.direction === 'en_to_ja' ? 'EN ➔ JA' : 'JA ➔ EN';
    ctx.fillText(`[ ${tagText} ]  ${dirText}`, -cardW/2 + 20, -cardH/2 + 28);

    ctx.textAlign = 'right';
    const streakEnJa = app.currentItem.correctStreakEnJa || 0;
    const streakJaEn = app.currentItem.correctStreakJaEn || 0;
    
    ctx.fillStyle = '#9ca3af';
    ctx.font = '11px Helvetica, sans-serif';
    ctx.fillText(`英日:${'★'.repeat(streakEnJa)}${'☆'.repeat(3 - streakEnJa)}  日英:${'★'.repeat(streakJaEn)}${'☆'.repeat(3 - streakJaEn)}`, cardW/2 - 20, -cardH/2 + 28);
    ctx.textAlign = 'left';

    if (!app.isFlipped) {
        ctx.fillStyle = '#ffffff';
        if (app.direction === 'en_to_ja') {
            const text = app.currentItem.question;
            ctx.font = 'bold 34px Helvetica, Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(text, 0, 15);
        } else {
            const text = app.getShortAnswer(app.currentItem);
            ctx.font = 'bold 18px "Hiragino Kaku Gothic ProN", Meiryo, sans-serif';
            ctx.textAlign = 'center';
            wrapText(ctx, text, 0, -5, cardW - 40, 26);
        }
    } else {
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';

        const topTextY = -cardH/2 + 55;
        ctx.font = 'bold 16px Helvetica, sans-serif';
        ctx.fillStyle = accentColor;
        ctx.fillText(app.currentItem.question, 0, topTextY);

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        const lineY = topTextY + 12;
        ctx.moveTo(-cardW/2 + 30, lineY);
        ctx.lineTo(cardW/2 - 30, lineY);
        ctx.stroke();

        const lines = app.currentItem.answer.split('\n');
        let startY = lineY + 22;
        
        lines.forEach((line, index) => {
            const trimmedLine = line.trim();
            if (!trimmedLine) return;

            if (trimmedLine.startsWith('[') || trimmedLine.startsWith('(') || trimmedLine.startsWith('【')) {
                ctx.fillStyle = '#00E5FF'; 
                ctx.font = 'bold 11px "Hiragino Kaku Gothic ProN", Meiryo, sans-serif';
                wrapText(ctx, trimmedLine, 0, startY, cardW - 45, 16);
                startY += 18;
            } 
            else if (index > 0 && !!trimmedLine.match(/[a-zA-Z]/)) {
                ctx.fillStyle = '#e5e7eb'; 
                ctx.font = 'italic 12px Helvetica, Arial, sans-serif';
                wrapText(ctx, trimmedLine, 0, startY, cardW - 45, 17);
                startY += 20;
            } 
            else if (index > 0) {
                ctx.fillStyle = '#9ca3af'; 
                ctx.font = '11px "Hiragino Kaku Gothic ProN", Meiryo, sans-serif';
                wrapText(ctx, trimmedLine, 0, startY, cardW - 45, 16);
                startY += 19;
            } 
            else {
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px "Hiragino Kaku Gothic ProN", Meiryo, sans-serif';
                wrapText(ctx, trimmedLine, 0, startY, cardW - 45, 20);
                startY += 24;
            }
        });
    }

    ctx.restore();
}

function drawComboAnimation() {
    if (app.comboTextAlpha > 0) {
        ctx.save();
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(0, 255, 102, ${app.comboTextAlpha})`;
        
        const fontSize = Math.floor(26 * app.comboTextScale);
        ctx.font = `italic bold ${fontSize}px "Courier New", monospace`;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00FF66';
        
        const textY = layout.cardCenterY - (layout.cardH / 2) - 25;
        ctx.fillText(`x${app.comboCount} Combo!!`, VIEW_WIDTH / 2, textY);
        
        ctx.restore();

        app.comboTextScale += (1.0 - app.comboTextScale) * 0.15;
        app.comboTextAlpha -= 0.015;
    }
}

function drawInteractiveArea() {
    if (app.isTransitioning) return;

    if (!app.isAnswered) {
        const btnX = 30;
        const btnW = VIEW_WIDTH - 60; 
        const btnH = 54;
        const startY = layout.startY;
        const spacing = 9;

        ctx.textAlign = 'center';
        for (let i = 0; i < 5; i++) {
            const currentBtnY = startY + i * (btnH + spacing);
            const choice = app.choices[i];

            let btnGrad = ctx.createLinearGradient(btnX, currentBtnY, btnX, currentBtnY + btnH);
            btnGrad.addColorStop(0, '#111622');
            btnGrad.addColorStop(1, '#0b0e16');
            ctx.fillStyle = btnGrad;
            
            ctx.strokeStyle = 'rgba(0, 229, 255, 0.2)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.roundRect(btnX, currentBtnY, btnW, btnH, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#00E5FF';
            ctx.font = 'bold 13px "Courier New", monospace';
            ctx.fillText(`${i + 1}`, btnX + 22, currentBtnY + btnH / 2 + 5);

            ctx.strokeStyle = 'rgba(0, 229, 255, 0.15)';
            ctx.beginPath();
            ctx.moveTo(btnX + 40, currentBtnY + 12);
            ctx.lineTo(btnX + 40, currentBtnY + 36);
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'left';
            if (app.direction === 'en_to_ja') {
                ctx.font = 'bold 13.5px "Hiragino Kaku Gothic ProN", Meiryo, sans-serif';
                drawButtonText(ctx, choice.text, btnX + 52, currentBtnY + btnH / 2, btnW - 65, 15);
            } else {
                ctx.font = 'bold 12.5px Helvetica, sans-serif';
                drawButtonText(ctx, choice.text, btnX + 52, currentBtnY + btnH / 2, btnW - 65, 13);
            }
        }
        ctx.textAlign = 'left';
    } 
    else if (app.isFlipped && app.flipProgress === 1) {
        const resultY = layout.resultY;
        const boxW = VIEW_WIDTH - 60;

        ctx.fillStyle = app.selectedChoice.isCorrect ? 'rgba(0, 255, 102, 0.08)' : 'rgba(255, 51, 102, 0.08)';
        ctx.strokeStyle = app.selectedChoice.isCorrect ? '#00FF66' : '#ff3366';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(30, resultY, boxW, 110, 12);
        ctx.fill();
        ctx.stroke();

        ctx.textAlign = 'center';
        if (app.selectedChoice.isCorrect) {
            ctx.fillStyle = '#00FF66';
            ctx.font = 'bold 24px "Hiragino Kaku Gothic ProN", sans-serif';
            
            const comboNote = app.comboCount >= 2 ? ` (${app.comboCount} Combo!!)` : '';
            ctx.fillText(`正 解 ！${comboNote}`, VIEW_WIDTH / 2, resultY + 65);
        } else {
            ctx.fillStyle = '#ff3366';
            ctx.font = 'bold 24px "Hiragino Kaku Gothic ProN", sans-serif';
            ctx.fillText('不 正 解', VIEW_WIDTH / 2, resultY + 45);

            ctx.fillStyle = '#ffffff';
            const correctOne = app.choices.find(c => c.isCorrect);
            if (app.direction === 'en_to_ja') {
                ctx.font = 'bold 14px "Hiragino Kaku Gothic ProN", sans-serif';
                ctx.fillText(`正解: ${correctOne.text}`, VIEW_WIDTH / 2, resultY + 80);
            } else {
                ctx.font = 'bold 13px Helvetica, sans-serif';
                ctx.fillText(`正解: ${correctOne.text}`, VIEW_WIDTH / 2, resultY + 80);
            }
        }

        const btnY = layout.btnY;
        const btnW = VIEW_WIDTH - 80; 
        const btnH = 65;
        const btnX = 40;

        let nextGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
        nextGrad.addColorStop(0, '#0e2b19');
        nextGrad.addColorStop(1, '#091c10');
        ctx.fillStyle = nextGrad;
        ctx.strokeStyle = '#00FF66';
        ctx.lineWidth = 2.5;
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'rgba(0, 255, 102, 0.4)';
        ctx.beginPath();
        ctx.roundRect(btnX, btnY, btnW, btnH, 14);
        ctx.fill();
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#33ff88';
        ctx.font = 'bold 18px "Hiragino Kaku Gothic ProN", sans-serif';
        ctx.fillText('次の問題に進む  ▶', VIEW_WIDTH / 2, btnY + 38);
        
        ctx.textAlign = 'left';
    }
}

function updateAndDrawParticles() {
    for (let i = app.particles.length - 1; i >= 0; i--) {
        const p = app.particles[i];
        p.update();
        p.draw(ctx);
        if (p.alpha <= 0) {
            app.particles.splice(i, 1);
        }
    }
}

// ==========================================
// 【メニュー & システム操作】
// ==========================================
function toggleMenu(event) {
    if (event) {
        event.stopPropagation();
    }
    const menu = document.getElementById('sideMenu');
    menu.classList.toggle('active');
}

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('active');
    setTimeout(() => {
        toast.classList.remove('active');
    }, 2000);
}

function resetProgressWithConfirm() {
    if (confirm("これまでの学習進捗率（★の数）がすべて0にリセットされます。本当によろしいですか？")) {
        app.reset();
        showToast("すべての学習状況をリセットしました");
        createConfetti(VIEW_WIDTH / 2, layout.cardCenterY, '#ff3366', 30);
        const menu = document.getElementById('sideMenu');
        menu.classList.remove('active');
    }
}

function wrapText(context, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    let currentY = y;

    if (text.match(/[\u3000-\u303f\u3040-\u309f\u30a0-\u30ff\uff00-\uff9f\u4e00-\u9faf]/)) {
        let chars = text.split('');
        for (let n = 0; n < chars.length; n++) {
            let testLine = line + chars[n];
            let metrics = context.measureText(testLine);
            let testWidth = metrics.width;
            if (testWidth > maxWidth && n > 0) {
                context.fillText(line, x, currentY);
                line = chars[n];
                currentY += lineHeight;
            } else {
                line = testLine;
            }
        }
        context.fillText(line, x, currentY);
        return;
    }

    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        let metrics = context.measureText(testLine);
        let testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
            context.fillText(line, x, currentY);
            line = words[n] + ' ';
            currentY += lineHeight;
        } else {
            line = testLine;
        }
    }
    context.fillText(line, x, currentY);
}

function gameLoop() {
    drawApp();
    requestAnimationFrame(gameLoop);
}

// コンテナ外（メニュー外）をクリックしたときにスライドメニューを閉じるイベント（PCおよびスマホバブリング対策）
document.addEventListener('click', (e) => {
    const menu = document.getElementById('sideMenu');
    // メニュー自体をクリックしていない場合のみ閉じる
    if (menu && menu.classList.contains('active') && !menu.contains(e.target)) {
        menu.classList.remove('active');
    }
});
</script>
